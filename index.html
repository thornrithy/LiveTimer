<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Clock</title>
    <link type="image/png" sizes="32x32" rel="icon" href="https://img.icons8.com/liquid-glass-color/96/time.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Righteous&family=Archivo+Black&family=Montserrat:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/style.css">
</head>



<body>
    <div class="background-overlay" id="bgOverlay"></div>

    <div class="main-container" id="mainContainer">
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-clock"></i> Live Clock
            </div>
            <div class="top-buttons d-flex gap-3">
                <button class="youtube-toggle-btn" id="youtubeToggleBtn">
                    <i class="fas fa-music"></i>
                </button>
                <button class="todo-toggle-btn" id="todoToggleBtn">
                    <i class="fas fa-list-check"></i>
                </button>
                <button class="settings-btn" onclick="openSettings()">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>

        <div class="time-display">
            <div class="time-text" id="timeDisplay">00:00:00</div>
            <div class="date-text" id="dateDisplay"></div>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('clock')">
                <i class="fas fa-clock"></i> Live Clock
            </button>
            <button class="mode-btn" onclick="setMode('countdown')">
                <i class="fas fa-hourglass-half"></i> Countdown
            </button>
            <button class="mode-btn" onclick="setMode('pomodoro')">
                <i class="fas fa-coffee"></i> Pomodoro
            </button>
        </div>

        <div class="countdown-controls" id="countdownControls">
            <button class="control-btn" onclick="setCountdown(5)">5 min</button>
            <button class="control-btn" onclick="setCountdown(15)">15 min</button>
            <button class="control-btn" onclick="setCountdown(30)">30 min</button>
            <button class="control-btn" onclick="setCustomTime()">
                <i class="fas fa-edit"></i> Custom
            </button>
            <button class="control-btn" onclick="toggleTimer()">
                <i class="fas fa-play" id="timerIcon"></i>
            </button>
            <button class="control-btn" onclick="resetTimer()">
                <i class="fas fa-redo"></i> Reset
            </button>
        </div>

        <div class="custom-timer-container" id="customTimerContainer">
            <div class="time-input-group">
                <span class="time-label">Hours</span>
                <input type="number" class="time-input" id="hoursInput" min="0" max="23" value="0" placeholder="0">
            </div>
            <div class="time-input-group">
                <span class="time-label">Minutes</span>
                <input type="number" class="time-input" id="minutesInput" min="0" max="59" value="0" placeholder="0">
            </div>
            <div class="time-input-group">
                <span class="time-label">Seconds</span>
                <input type="number" class="time-input" id="secondsInput" min="0" max="59" value="0" placeholder="0">
            </div>
            <button class="control-btn" onclick="applyCustomTime()">
                <i class="fas fa-check"></i> Apply
            </button>
            <button class="control-btn" onclick="cancelCustomTime()">
                <i class="fas fa-times"></i> Cancel
            </button>
        </div>
    </div>

    <!-- YouTube Sidebar -->
    <div class="youtube-sidebar" id="youtubeSidebar">
        <div class="sidebar-header">
            <h3><i class="fab fa-youtube"></i> Music Player</h3>
            <span id="youtubeCount">0 videos</span>
        </div>

        <div class="youtube-player-container">
            <iframe class="youtube-player" id="youtubePlayer" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
            </iframe>
        </div>

        <div class="youtube-input-container">
            <input type="text" class="youtube-input" id="youtubeInput" placeholder="Paste YouTube URL...">
            <button class="add-btn" onclick="addYouTubeVideo()">
                <i class="fas fa-plus"></i> Add
            </button>
        </div>
        <ul class="youtube-list p-0" id="youtubeList"></ul>
    </div>

    <!-- Todo Sidebar -->
    <div class="todo-sidebar" id="todoSidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-list-check"></i> My Tasks</h3>
            <span id="todoCount">0 tasks</span>
        </div>

        <div class="icon-selector" id="iconSelector">
            <div class="icon-option selected" data-icon="circle-check" onclick="selectIcon(this)">
                <i class="fas fa-circle-check"></i>
            </div>
            <div class="icon-option" data-icon="star" onclick="selectIcon(this)">
                <i class="fas fa-star"></i>
            </div>
            <div class="icon-option" data-icon="heart" onclick="selectIcon(this)">
                <i class="fas fa-heart"></i>
            </div>
            <div class="icon-option" data-icon="flag" onclick="selectIcon(this)">
                <i class="fas fa-flag"></i>
            </div>
            <div class="icon-option" data-icon="fire" onclick="selectIcon(this)">
                <i class="fas fa-fire"></i>
            </div>
            <div class="icon-option" data-icon="bolt" onclick="selectIcon(this)">
                <i class="fas fa-bolt"></i>
            </div>
        </div>

        <div class="todo-input-container">
            <input type="text" class="todo-input" id="todoInput" placeholder="Add a new task...">
            <button class="add-btn" onclick="addTodo()">
                <i class="fas fa-plus"></i> Add
            </button>
        </div>
        <ul class="todo-list p-0" id="todoList"></ul>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-cog"></i> Settings</h2>
                <button class="close-btn" onclick="closeSettings()">&times;</button>
            </div>

            <div class="settings-section">
                <h4><i class="fas fa-image"></i> Background</h4>
                <div class="background-grid">
                    <div class="bg-option active" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)" onclick="setBackground('gradient1')"></div>
                    <div class="bg-option" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" onclick="setBackground('gradient2')"></div>
                    <div class="bg-option" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" onclick="setBackground('gradient3')"></div>
                    <div class="bg-option" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" onclick="setBackground('gradient4')"></div>
                    <div class="bg-option" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)" onclick="setBackground('gradient5')"></div>
                    <div class="bg-option" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%)" onclick="setBackground('gradient6')"></div>
                    <div class="bg-option" style="background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800')" onclick="setBackground('mountains')"></div>
                    <div class="bg-option" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800')" onclick="setBackground('lake')"></div>
                    <div class="bg-option" style="background-image: url('https://media.giphy.com/media/l0HlSF6Qa8Qw7W5Y4/giphy.gif')" onclick="setBackground('gif1')">
                        <div class="gif-indicator">GIF</div>
                    </div>
                    <div class="bg-option" style="background-image: url('https://media.giphy.com/media/3o7aD2s2fC7bV7aRkY/giphy.gif')" onclick="setBackground('gif2')">
                        <div class="gif-indicator">GIF</div>
                    </div>
                </div>
                <input type="text" class="custom-input mt-2" placeholder="Paste image or GIF URL" id="customBgInput" onchange="setCustomBackground()">
                <div class="file-input-container mt-2">
                    <label class="file-input-label">
                        <i class="fas fa-upload"></i> Upload Image/GIF from Computer
                        <input type="file" class="file-input" id="bgFileInput" accept="image/*,.gif" onchange="handleFileUpload(event)">
                    </label>
                </div>
            </div>

            <div class="settings-section">
                <h4><i class="fas fa-font"></i> Time Font</h4>
                <div class="font-selector">
                    <button class="font-option active" onclick="setFont('Orbitron')">Orbitron</button>
                    <button class="font-option" onclick="setFont('Righteous')">Righteous</button>
                    <button class="font-option" onclick="setFont('Archivo Black')">Archivo</button>
                    <button class="font-option" onclick="setFont('Poppins')">Poppins</button>
                    <button class="font-option" onclick="setFont('Montserrat')">Montserrat</button>
                    <button class="font-option" onclick="setFont('Rajdhani')">Rajdhani</button>
                </div>

                <div class="font-size-control">
                    <span>Font Size:</span>
                    <input type="range" min="40" max="200" value="120" class="font-size-slider" id="fontSizeSlider" oninput="updateFontSize(this.value)">
                    <span class="font-size-value" id="fontSizeValue">120px</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/script.js"></script>
</body>

</html>
